name: Refresh national team data

on:
  schedule:
    - cron: '0 21 * * *'  # Kell 23:00 Eesti aja järgi (UTC+2)
    - cron: '0 4 * * *'   # Kell 06:00 Eesti aja järgi (UTC+2) — püüab kinni hilisõhtused mängud
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Refresh national team data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python backend/migrations/09_refresh_national_team.py
